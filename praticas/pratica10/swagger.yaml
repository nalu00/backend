openapi: 3.0.0
info:
  title: Minha API REST
  version: 0.1.0

servers:
  - url: http://localhost:3000/

tags:
  - name: usuarios

paths:

  /usuarios:
    post:
      tags: [usuarios]
      summary: Cria um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, senha]
              properties:
                email:
                  type: string
                senha:
                  type: string
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '422':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'

    delete:
      tags: [usuarios]
      summary: Deleta um usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario]
              properties:
                usuario:
                  type: string
      responses:
        '204':
          description: Removido com sucesso


  /usuarios/login:
    post:
      tags: [usuarios]
      summary: Realiza login e gera token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, senha]
              properties:
                usuario:
                  type: string
                senha:
                  type: string
      responses:
        '200':
          description: Token gerado
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'


  /usuarios/renovar:
    post:
      tags: [usuarios]
      summary: Renova o token JWT
      security:
        - JWTAuth: []
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'


components:
  schemas:
    Usuario:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string

    Mensagem:
      type: object
      properties:
        msg:
          type: string

  securitySchemes:
    JWTAuth:
      type: apiKey
      in: header
      name: authorization
